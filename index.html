<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kilibick27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: linear-gradient(135deg, #050b1a 0%, #0f2748 45%, #000000 100%);
    font-family: 'Segoe UI', sans-serif;
  }

  .bg-effects {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.35;
  }

  .stage {
    position: relative;
    z-index: 1;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4vh;
    padding: 4vh 4vw;
  }

  .row {
    display: flex;
    width: 100%;
    max-width: 1100px;
    justify-content: space-between;
    align-items: center;
    gap: 3vw;
  }

  .block {
    flex: 1;
    height: 22vh;
    max-height: 220px;
    min-height: 130px;
    border-radius: 22px;
    box-shadow: 0 0 25px rgba(91, 155, 213, 0.35), inset 0 0 20px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .b1 { background: linear-gradient(160deg, #000000 0%, #5b9bd5 100%); }

  .block-content {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .ddnet-icon {
    width: clamp(64px, 11vw, 110px);
    height: clamp(64px, 11vw, 110px);
    border-radius: 12px;
    object-fit: cover;
  }

  .claude-icon {
    width: clamp(36px, 6vw, 56px);
    height: clamp(36px, 6vw, 56px);
  }

  .block-label {
    color: #ffffff;
    font-family: 'Segoe UI', sans-serif;
    font-weight: 700;
    font-size: clamp(0.75rem, 1.6vw, 1rem);
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }
  .b2 { background: linear-gradient(160deg, #5b9bd5 0%, #000000 100%); }
  .b3 { background: linear-gradient(200deg, #000000 0%, #5b9bd5 100%); }
  .b4 { background: linear-gradient(200deg, #5b9bd5 0%, #000000 100%); }
  .b5 { background: linear-gradient(160deg, #000000 0%, #5b9bd5 100%); }

  .welcome {
    flex: 0 0 auto;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.1rem, 3.2vw, 2.2rem);
    color: #000000;
    text-shadow:
      -2px -2px 0 #ffffff, 2px -2px 0 #ffffff,
      -2px 2px 0 #ffffff, 2px 2px 0 #ffffff,
      0 0 20px rgba(91,155,213,0.8);
    padding: 0 2vw;
    white-space: nowrap;
    image-rendering: pixelated;
  }

  @keyframes fall {
    0%   { transform: translateY(-120px); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(1020px); opacity: 0; }
  }

  .fall {
    animation: fall linear infinite;
  }
  .f1  { animation-duration: 9s;  animation-delay: 0s; }
  .f2  { animation-duration: 12s; animation-delay: 2s; }
  .f3  { animation-duration: 7s;  animation-delay: 4s; }
  .f4  { animation-duration: 11s; animation-delay: 1s; }
  .f5  { animation-duration: 8s;  animation-delay: 3s; }
  .f6  { animation-duration: 10s; animation-delay: 0.5s; }
  .f7  { animation-duration: 13s; animation-delay: 2.5s; }
  .f8  { animation-duration: 9.5s; animation-delay: 5s; }
  .f9  { animation-duration: 7.5s; animation-delay: 3.5s; }
  .f10 { animation-duration: 11.5s; animation-delay: 1.5s; }

  .row.top .block {
    flex: 0 0 30%;
  }

  @media (max-width: 700px) {
    html, body { overflow: auto; }
    .stage { height: auto; min-height: 100vh; }
    .row { flex-direction: column; }
    .row.top .block { flex: 0 0 auto; width: 100%; }
    .block { width: 100%; }
  }
</style>
</head>
<body>

  <svg class="bg-effects" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
    <g fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
      <!-- молнии -->
      <g class="fall f1"><path d="M180 60 L120 220 L165 220 L100 400" transform="rotate(10 150 230)"/></g>
      <g class="fall f2"><path d="M1420 100 L1360 260 L1405 260 L1340 440" transform="rotate(-15 1380 270)"/></g>
      <g class="fall f3"><path d="M60 620 L10 760 L50 760 L0 900" transform="rotate(8 30 760)"/></g>
      <g class="fall f4"><path d="M1500 560 L1450 700 L1495 700 L1440 860" transform="rotate(-8 1470 710)"/></g>
      <g class="fall f5"><path d="M780 40 L740 150 L775 150 L730 260" transform="rotate(12 755 150)"/></g>

      <!-- треугольники -->
      <g class="fall f6"><path d="M300 460 L270 520 L330 520 Z"/></g>
      <g class="fall f7"><path d="M1210 180 L1180 240 L1240 240 Z"/></g>
      <g class="fall f8"><path d="M145 100 L118 155 L172 155 Z"/></g>
      <g class="fall f9"><path d="M1330 700 L1300 758 L1360 758 Z"/></g>
      <g class="fall f10"><path d="M725 780 L698 834 L752 834 Z"/></g>
    </g>
  </svg>

  <div class="stage">
    <div class="row top">
      <div class="block b1">
        <div class="block-content">
          <img class="ddnet-icon" src="https://avatars.mds.yandex.net/i?id=4f3dbcdae00b84bc1b7f14a5641ec3fc8f7c023c-5342121-images-thumbs&n=13" alt="DDNet">
          <span class="block-label">DDKClient</span>
        </div>
      </div>
      <div class="welcome">Welcome</div>
      <div class="block b2"></div>
    </div>
    <div class="row bottom">
      <div class="block b3">
        <div class="block-content">
          <img class="claude-icon" src="https://avatars.mds.yandex.net/i?id=4930292dd525cc048500d7eaa59c817b5eb7da0d-5660351-images-thumbs&n=13" alt="Claude">
          <span class="block-label">VibeCoding</span>
        </div>
      </div>
      <div class="block b4"></div>
      <div class="block b5"></div>
    </div>
  </div>

</body>
</html>
