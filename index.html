<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kilibick27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: linear-gradient(135deg, #050b1a 0%, #0f2748 45%, #000000 100%);
    font-family: 'Segoe UI', sans-serif;
  }

  .bg-effects {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.4;
    overflow: hidden;
    pointer-events: none;
  }

  .bolt {
    position: absolute;
    top: 0;
    width: clamp(16px, 1.8vw, 26px);
    height: clamp(66px, 7.4vw, 108px);
    animation-name: fall-full;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    animation-fill-mode: backwards;
  }

  @keyframes fall-full {
    0%   { transform: translateY(-8vh) rotate(var(--rot, 0deg)); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translateY(120vh) rotate(var(--rot, 0deg)); opacity: 0; }
  }

  .stage {
    position: relative;
    z-index: 1;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4vh;
    padding: 4vh 4vw;
  }

  .row {
    display: flex;
    width: 100%;
    max-width: 1100px;
    justify-content: space-between;
    align-items: center;
    gap: 3vw;
  }

  .block {
    flex: 1;
    height: 22vh;
    max-height: 220px;
    min-height: 130px;
    border-radius: 22px;
    box-shadow: 0 0 25px rgba(91, 155, 213, 0.35), inset 0 0 20px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .b1 { background: linear-gradient(160deg, #000000 0%, #5b9bd5 100%); }

  .block-content {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .ddnet-icon {
    width: clamp(192px, 33vw, 330px);
    height: clamp(64px, 11vw, 110px);
    object-fit: contain;
  }

  .claude-icon {
    width: clamp(72px, 12vw, 112px);
    height: clamp(72px, 12vw, 112px);
  }

  .github-icon {
    width: clamp(72px, 12vw, 112px);
    height: clamp(72px, 12vw, 112px);
    filter: invert(1);
  }

  .block-label {
    color: #ffffff;
    font-family: 'Segoe UI', sans-serif;
    font-weight: 700;
    font-size: clamp(0.75rem, 1.6vw, 1rem);
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }
  .b2 { background: linear-gradient(160deg, #5b9bd5 0%, #000000 100%); }
  .b3 { background: linear-gradient(200deg, #000000 0%, #5b9bd5 100%); }
  .b4 { background: linear-gradient(200deg, #5b9bd5 0%, #000000 100%); }
  .b5 { background: linear-gradient(160deg, #000000 0%, #5b9bd5 100%); }

  .welcome {
    flex: 0 0 auto;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.1rem, 3.2vw, 2.2rem);
    color: #000000;
    text-shadow:
      -2px -2px 0 #ffffff, 2px -2px 0 #ffffff,
      -2px 2px 0 #ffffff, 2px 2px 0 #ffffff,
      0 0 20px rgba(91,155,213,0.8);
    padding: 0 2vw;
    white-space: nowrap;
    image-rendering: pixelated;
  }

  .row.top .block {
    flex: 0 0 30%;
  }

  @media (max-width: 700px) {
    html, body { overflow: auto; }
    .stage { height: auto; min-height: 100vh; }
    .row { flex-direction: column; }
    .row.top .block { flex: 0 0 auto; width: 100%; }
    .block { width: 100%; }
  }
</style>
</head>
<body>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">

        <stop offset="0%" stop-color="#fff8c4"/>
        <stop offset="45%" stop-color="#ffd400"/>
        <stop offset="100%" stop-color="#b8860b"/>
      </linearGradient>
      <path id="bolt-shape" d="M12 0 L0 46 L8 46 L3 90 L22 38 L13 38 Z"/>
    </defs>
  </svg>

  <div class="bg-effects">
    <svg class="bolt" viewBox="0 0 22 90" style="left:2%;  --rot:-8deg;  animation-duration:7.0s;  animation-delay:0s;">   <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:8%;  --rot:9deg;   animation-duration:9.4s;  animation-delay:0.6s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>

    <svg class="bolt" viewBox="0 0 22 90" style="left:20%; --rot:6deg;   animation-duration:10.2s; animation-delay:0.3s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:27%; --rot:-9deg;  animation-duration:8.1s;  animation-delay:2.0s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:33%; --rot:11deg;  animation-duration:9.6s;  animation-delay:1.6s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:39%; --rot:-6deg;  animation-duration:7.4s;  animation-delay:2.8s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:45%; --rot:8deg;   animation-duration:10.8s; animation-delay:0.9s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:50%; --rot:-10deg; animation-duration:8.8s;  animation-delay:3.4s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:56%; --rot:12deg;  animation-duration:6.9s;  animation-delay:2.3s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:62%; --rot:-7deg;  animation-duration:9.9s;  animation-delay:4.0s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:68%; --rot:10deg;  animation-duration:7.7s;  animation-delay:1.0s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:74%; --rot:-12deg; animation-duration:10.4s; animation-delay:3.8s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:80%; --rot:5deg;   animation-duration:8.3s;  animation-delay:4.6s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:85%; --rot:-9deg;  animation-duration:9.1s;  animation-delay:2.6s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:90%; --rot:7deg;   animation-duration:6.8s;  animation-delay:5.2s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:94%; --rot:-11deg; animation-duration:10.9s; animation-delay:3.0s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
    <svg class="bolt" viewBox="0 0 22 90" style="left:98%; --rot:9deg;   animation-duration:8.6s;  animation-delay:4.4s;"> <use href="#bolt-shape" fill="url(#boltGrad)" stroke="#8a6100" stroke-width="0.8" stroke-linejoin="round"/></svg>
  </div>

  <div class="stage">
    <div class="row top">
      <div class="block b1">
        <div class="block-content">
          <img class="ddnet-icon chroma-key" data-chroma="black" src="https://images.steamusercontent.com/ugc/47944499555036292/614ED66557CB2AFEB3EBF21CBCE353D354A8D07A/?imw=512&imh=512&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=true" alt="DDNet" crossorigin="anonymous">
          <span class="block-label">DDKClient</span>
        </div>
      </div>
      <div class="welcome">Welcome</div>
      <div class="block b2">
        <div class="block-content">
          <img class="github-icon" src="https://github.githubassets.com/favicons/favicon.svg" alt="GitHub">
          <span class="block-label">GitHub</span>
        </div>
      </div>
    </div>
    <div class="row bottom">
      <div class="block b3"></div>
      <div class="block b4">
        <div class="block-content">
          <img class="claude-icon chroma-key" src="https://avatars.mds.yandex.net/i?id=4930292dd525cc048500d7eaa59c817b5eb7da0d-5660351-images-thumbs&n=13" alt="Claude" crossorigin="anonymous">
          <span class="block-label">VibeCoding</span>
        </div>
      </div>
      <div class="block b5"></div>
    </div>
  </div>

  <script>
    function chromaKey(img) {
      var w = img.naturalWidth, h = img.naturalHeight;
      if (!w || !h) return;
      var mode = img.dataset.chroma || 'white';
      var canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var frame;
      try {
        frame = ctx.getImageData(0, 0, w, h);
      } catch (e) {
        return;
      }
      var px = frame.data;
      var threshold = 60;
      for (var i = 0; i < px.length; i += 4) {
        var r = px[i], g = px[i + 1], b = px[i + 2];
        var isKeyed = mode === 'black'
          ? (r < threshold && g < threshold && b < threshold)
          : (r > 255 - threshold && g > 255 - threshold && b > 255 - threshold);
        if (isKeyed) {
          px[i + 3] = 0;
        }
      }
      ctx.putImageData(frame, 0, 0);
      canvas.className = img.className;
      img.replaceWith(canvas);
    }

    document.querySelectorAll('img.chroma-key').forEach(function (img) {
      if (img.complete && img.naturalWidth) {
        chromaKey(img);
      } else {
        img.addEventListener('load', function () { chromaKey(img); });
      }
    });
  </script>

</html>
